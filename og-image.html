<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Preview — AnalogResearch</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #e7e5e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    h1 {
      font-size: 1rem;
      color: #78716c;
      margin-bottom: 16px;
    }

    .preview {
      width: 1200px;
      height: 630px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .preview img {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info {
      margin-top: 20px;
      color: #78716c;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>OG Image Preview (1200 × 630)</h1>
  <div class="preview">
    <img src="og-image.svg" alt="AnalogResearch OG image — 1200x630 social sharing card" width="1200" height="630">
  </div>
  <p class="info">
    To create og-image.png: open this page in a browser, take a screenshot of the card at 1200×630, and save as og-image.png.
  </p>
</body>
</html>
