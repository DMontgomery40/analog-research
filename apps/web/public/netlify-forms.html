<!-- This file helps Netlify detect forms during build -->
<!-- It's not meant to be visited directly -->
<!DOCTYPE html>
<html>
<head><title>Form Detection</title></head>
<body>
  <form name="founding_partner_application_v1" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="founding_partner_application_v1" />
    <input name="bot-field" />
    <input name="role_track" />
    <input name="full_name" />
    <input name="email" />
    <input name="linkedin_url" />
    <input name="github_url" />
    <input name="why_best_fit" />
    <input name="source" />
  </form>

  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="contact" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="subject" />
    <textarea name="message"></textarea>
  </form>

  <form name="quality_score_appeal_v1" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="quality_score_appeal_v1" />
    <input name="bot-field" />
    <input name="email" />
    <input name="score_type" />
    <input name="entity_type" />
    <input name="entity_id" />
    <input name="issue_type" />
    <textarea name="details"></textarea>
    <input name="evidence_url" />
    <textarea name="resolution"></textarea>
    <input name="source_page" />
  </form>

  <form name="moderation_appeal_v1" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" type="hidden" value="moderation_appeal_v1" />
    <input name="bot-field" />
    <input name="decision_id" />
    <input name="content_type" />
    <input name="content_id" />
    <input name="email" />
    <textarea name="appeal_reason"></textarea>
    <textarea name="freeform_context"></textarea>
  </form>
</body>
</html>
