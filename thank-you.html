<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks! — AnalogResearch</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf9;
      --fg: #1c1917;
      --muted: #78716c;
      --accent: #0d9488;
      --accent-light: #ccfbf1;
      --border: #e7e5e4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a09;
        --fg: #fafaf9;
        --muted: #a8a29e;
        --accent: #2dd4bf;
        --accent-light: #042f2e;
        --border: #292524;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 480px;
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      margin-bottom: 28px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Message received</h1>
    <p>Thanks for reaching out. We'll get back to you soon.</p>
    <a href="/">&larr; Back to AnalogResearch</a>
  </div>
</body>
</html>
