[build]
  command = "pnpm install && pnpm turbo build --filter=./apps/web"
  publish = "apps/web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_USE_NETLIFY_EDGE = "true"

[dev]
  command = "pnpm --filter ./apps/web dev"
  targetPort = 3000
  autoLaunch = true

# Global SEO/security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=0, must-revalidate"

# Next.js build assets - long-lived immutable caching
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# API subdomain CORS headers
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, X-API-Key, Authorization"
    X-Robots-Tag = "noindex"

# OpenAPI spec - serve from public folder
[[headers]]
  for = "/openapi.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=3600"

# llms.txt caching
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# NOTE: supabase.analog-research.org proxy is handled in proxy.ts
# Netlify redirects with Host conditions don't work with Next.js runtime
